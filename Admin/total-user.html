<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>total user</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; 
            color: #1a1a1a; 
            font-family: 'inter', sans-serif; 
            margin: 0; 
            padding: 20px;
            text-transform: lowercase;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
        }

        .header-page {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .btn-back {
            width: 45px; height: 45px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1e293b;
            text-decoration: none;
            transition: 0.3s;
        }

        h2 { margin: 0; font-size: 1.1rem; font-weight: 900; color: #1e293b; }

        /* TABLE STYLE */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 600px;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        td {
            padding: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #f8fafc;
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        .role-owner { background: #fee2e2; color: #ef4444; }
        .role-member { background: #e0f2fe; color: #007bff; }

        #loading-bar {
            width: 100%; height: 3px;
            background: #e2e8f0;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            border-radius: 10px;
        }
        #loading-bar::after {
            content: '';
            position: absolute;
            height: 100%; width: 40%;
            background: #007bff;
            animation: loading 1s infinite linear;
        }
        @keyframes loading { 0% { left: -40%; } 100% { left: 100%; } }

        .balance-text { color: #10b981; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-page">
            <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>management user</h2>
            <div style="width: 45px;"></div>
        </div>

        <div id="loading-bar"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>nama</th>
                        <th>no hp</th>
                        <th>role</th>
                        <th>saldo</th>
                        <th>api key</th>
                    </tr>
                </thead>
                <tbody id="list-user-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadUsers() {
            const loader = document.getElementById('loading-bar');
            const tableBody = document.getElementById('list-user-body');
            
            loader.style.display = 'block';
            
            db.ref('users').on('value', (snap) => {
                tableBody.innerHTML = "";
                if (snap.exists()) {
                    snap.forEach(child => {
                        const user = child.val();
                        const isOwner = user.role === 'owner';
                        
                        tableBody.innerHTML += `
                            <tr>
                                <td>${user.fullname || 'no name'}</td>
                                <td>${user.phone || '-'}</td>
                                <td>
                                    <span class="role-badge ${isOwner ? 'role-owner' : 'role-member'}">
                                        ${user.role || 'member'}
                                    </span>
                                </td>
                                <td class="balance-text">rp ${(user.balance || 0).toLocaleString('id-ID')}</td>
                                <td style="font-family: monospace; color: #94a3b8; font-size: 0.7rem;">
                                    ${user.apiKey || '-'}
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">belum ada user terdaftar</td></tr>';
                }
                loader.style.display = 'none';
            });
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
