<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin | petinggi web 😼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; padding: 20px; text-transform: lowercase;
            padding-bottom: 80px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #1a1a1a; text-decoration: none; background: white; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: lowercase; margin-bottom: 8px; letter-spacing: 0.5px; margin-top: 10px; }
        input, textarea, select { 
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; 
            background: #f8fafc; outline: none; font-family: inherit; box-sizing: border-box; 
            margin-bottom: 15px; font-weight: 600; font-size: 0.85rem; transition: 0.3s;
            text-transform: lowercase;
        }
        
        .merchant-badge {
            background: #1a1a1a; border: 1px solid #334155; padding: 12px; border-radius: 15px;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            color: #ffffff; font-size: 0.75rem; font-weight: 800;
        }

        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .img-slot { 
            aspect-ratio: 1/1; background: #f8fafc; border: 2px dashed #e2e8f0; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; position: relative;
        }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; }

        .secret-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 20px; border-radius: 20px; margin-top: 15px; margin-bottom: 20px; }
        .action-area { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(240, 244, 248, 0.9); backdrop-filter: blur(10px); padding: 15px 20px 20px; box-sizing: border-box; z-index: 100; }
        .btn-submit { width: 100%; max-width: 460px; margin: 0 auto; display: block; padding: 18px; background: #1a1a1a; color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: lowercase; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: #007bff;"></i>
    <p id="loading-text" style="margin-top: 15px; font-weight: 700; font-size: 0.8rem;">sedang memproses...</p>
</div>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="font-size: 1rem; margin: 0; font-weight: 900;">tambah produk petinggi 😼</h2>
    </div>

    <div class="card">
        <div class="merchant-badge">
            <i class="fa-solid fa-crown" style="color: #fbbf24;"></i>
            <span>pangkat: <b>PETINGGI WEB INI 😼</b></span>
        </div>

        <label>foto produk :</label>
        <div class="image-grid" id="preview-container">
            <div class="img-slot" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-plus" style="color: #007bff;"></i>
            </div>
        </div>
        <input type="file" id="file-input" hidden multiple accept="image/*" onchange="prosesMultiFoto(this)">

        <label>nama produk :</label>
        <input type="text" id="nama-produk" placeholder="masukkan nama produk">

        <label>kategori :</label>
        <select id="kategori-produk">
            <option value="akun">akun</option>
            <option value="app prem">app prem</option>
            <option value="produk digital">produk digital</option>
            <option value="lain nya">lain nya</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>stok :</label>
                <input type="number" id="stok-produk" value="999">
            </div>
            <div>
                <label>harga jual (rp) :</label>
                <input type="number" id="harga-final" placeholder="7000">
            </div>
        </div>

        <label>deskripsi produk :</label>
        <textarea id="desc-produk" rows="3" placeholder="deskripsi untuk pembeli..."></textarea>

        <div class="secret-box">
            <h4 style="margin:0 0 15px 0; font-size:0.7rem; color:#c53030;"><i class="fa-solid fa-lock"></i> data untuk pembeli (otomatis kirim)</h4>
            <label>email / user :</label>
            <input type="text" id="email-akun">
            <label>kata sandi :</label>
            <input type="text" id="pass-akun">
            <label>info tambahan :</label>
            <textarea id="extra-info" rows="2" placeholder="contoh: login via fb, garansi 30 hari, dll"></textarea>
        </div>
    </div>
</div>

<div class="action-area">
    <button class="btn-submit" id="btn-save" onclick="uploadPetinggi()">posting produk admin 😼</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseconfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseconfig);
    const db = firebase.database();

    let selectedFiles = [];
    const randomid = "prd-" + Math.floor(1000 + Math.random() * 9000);

    function prosesMultiFoto(input) {
        if (input.files) {
            selectedFiles = [...selectedFiles, ...Array.from(input.files)];
            renderPreview();
        }
    }

    function renderPreview() {
        const container = document.getElementById('preview-container');
        container.innerHTML = selectedFiles.map((file, i) => `
            <div class="img-slot" onclick="removeImg(${i})">
                <img src="${URL.createObjectURL(file)}">
            </div>
        `).join('') + `
            <div class="img-slot" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-plus"></i>
            </div>
        `;
    }

    function removeImg(i) {
        selectedFiles.splice(i, 1);
        renderPreview();
    }

    async function uploadPetinggi() {
        const btn = document.getElementById('btn-save');
        const nama = document.getElementById('nama-produk').value.trim();
        const harga = parseInt(document.getElementById('harga-final').value);
        
        // Ambil token admin dari login session
        const sessionToken = localStorage.getItem('sessionToken'); 

        if(!sessionToken) return alert("kamu belum login!");
        if(selectedFiles.length === 0 || !nama || !harga) return alert("lengkapi semua data!");

        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        btn.disabled = true;

        try {
            // 1. Ambil data Toko & Dana kamu dari profile
            const profileSnap = await db.ref('users/' + sessionToken.replace(/\./g, ',')).get();
            const myData = profileSnap.val();
            
            const myShopName = myData?.shopName || "ADMIN MARKET";
            const myDana = myData?.paymentNumber || "08312145921";

            // 2. Upload Foto
            let uploadedUrls = [];
            for(let f of selectedFiles) {
                const formData = new FormData();
                formData.append("image", f);
                const res = await fetch("https://api.imgbb.com/1/upload?key=50145b1eaa1385c3d9549ebe496eb5b5", {
                    method: "POST",
                    body: formData
                }).then(r => r.json());
                if(res.success) uploadedUrls.push(res.data.url);
            }

            // 3. Simpan ke Database dengan DATA LENGKAP agar ulasan & nama toko muncul
            await db.ref('products/' + randomid).set({
                productId: randomid,
                nama: nama,
                harga: harga,
                stok: parseInt(document.getElementById('stok-produk').value),
                foto: uploadedUrls[0],
                album: uploadedUrls,
                kategori: document.getElementById('kategori-produk').value,
                deskripsi: document.getElementById('desc-produk').value,
                
                // --- DATA IDENTITAS OWNER (WAJIB ADA) ---
                ownerToken: sessionToken, 
                ownerDana: myDana,
                shopName: myShopName,
                uploadBy: myShopName,
                // ---------------------------------------
                
                status: "active",
                timestamp: Date.now(),
                akun: {
                    email: document.getElementById('email-akun').value,
                    pass: document.getElementById('pass-akun').value,
                    a2f: "off",
                    tambahan: document.getElementById('extra-info').value
                }
            });

            alert("produk admin berhasil diposting! 😼");
            window.location.href = 'dashboard.html';

        } catch (e) {
            alert("gagal: " + e.message);
            overlay.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
