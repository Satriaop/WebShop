<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin | tambah saldo 😼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; padding: 20px; text-transform: lowercase;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #1a1a1a; text-decoration: none; background: white; }
        
        .form-card {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #fff;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 900; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        select, input {
            width: 100%; padding: 14px 18px; border-radius: 15px;
            border: 1.5px solid #e2e8f0; font-family: inherit; font-size: 0.85rem;
            outline: none; transition: 0.3s; background: #f8fafc;
        }
        select:focus, input:focus { border-color: #007bff; background: white; }

        .btn-submit {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: #1a1a1a; color: white; font-weight: 800; font-size: 0.9rem;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }

        .user-info-preview {
            margin-top: 15px; padding: 12px; background: #e0f2fe; 
            border-radius: 12px; display: none;
        }
        .user-info-preview p { margin: 0; font-size: 0.75rem; font-weight: 700; color: #0369a1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="font-size: 1rem; margin: 0; font-weight: 900;">tambah saldo user 😼</h2>
    </div>

    <div class="form-card">
        <div class="input-group">
            <label>pilih user / owner</label>
            <select id="user-select" onchange="showCurrentBalance()">
                <option value="">memuat daftar user...</option>
            </select>
            <div id="preview-balance" class="user-info-preview">
                <p id="balance-text">saldo saat ini: rp 0</p>
            </div>
        </div>

        <div class="input-group">
            <label>nominal saldo (rp)</label>
            <input type="number" id="nominal" placeholder="contoh: 50000">
        </div>

        <button class="btn-submit" id="btn-proses" onclick="tambahSaldo()">
            <i class="fa-solid fa-paper-plane"></i> proses tambah saldo
        </button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userData = {};

    function loadUsers() {
        db.ref('users').on('value', (snap) => {
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">-- pilih user --</option>';
            
            if (snap.exists()) {
                snap.forEach(child => {
                    const u = child.val();
                    const token = child.key;
                    userData[token] = u;
                    
                    const name = u.fullname || u.username || "tanpa nama";
                    const role = u.role || "user";
                    select.innerHTML += `<option value="${token}">${name} [${role}]</option>`;
                });
            }
        });
    }

    function showCurrentBalance() {
        const token = document.getElementById('user-select').value;
        const preview = document.getElementById('preview-balance');
        const text = document.getElementById('balance-text');

        if (token && userData[token]) {
            preview.style.display = 'block';
            const sld = userData[token].balance || 0;
            text.innerText = `saldo saat ini: rp ${sld.toLocaleString('id-ID')}`;
        } else {
            preview.style.display = 'none';
        }
    }

    async function tambahSaldo() {
        const token = document.getElementById('user-select').value;
        const nominal = parseInt(document.getElementById('nominal').value);
        const btn = document.getElementById('btn-proses');

        if (!token) return alert("pilih user dulu!");
        if (!nominal || nominal <= 0) return alert("masukan nominal yang valid!");

        if (!confirm(`tambah saldo rp ${nominal.toLocaleString('id-ID')} ke ${userData[token].fullname}?`)) return;

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> memproses...';

        try {
            const currentBalance = parseInt(userData[token].balance || 0);
            const newBalance = currentBalance + nominal;

            await db.ref('users/' + token).update({
                balance: newBalance
            });

            // Catat log ke riwayat transaksi admin (opsional)
            const logId = "log-" + Date.now();
            await db.ref('admin_logs/' + logId).set({
                type: "add_saldo",
                targetToken: token,
                targetName: userData[token].fullname,
                amount: nominal,
                timestamp: Date.now()
            });

            alert("berhasil! saldo telah ditambahkan 😼");
            document.getElementById('nominal').value = "";
        } catch (e) {
            alert("gagal: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> proses tambah saldo';
        }
    }

    window.onload = loadUsers;
</script>
</body>
</html>
