<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Produk</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; text-transform: lowercase; overflow-x: hidden; width: 100%;
        }

        .header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            height: 70px; display: flex; align-items: center; padding: 0 20px;
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .btn-back {
            width: 42px; height: 42px; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-right: 15px; color: #1e293b;
        }

        .content { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* Style Card */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; animation: fadein 0.5s ease; }
        .p-card { background: white; padding: 10px; border-radius: 22px; position: relative; border: 1px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.02); cursor: pointer;}
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; margin-bottom: 10px; background: #f8fafc; }
        
        /* Modal Edit */
        #modal-edit { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 1000; }
        .modal-body { background: white; width: 100%; padding: 25px; border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-body label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-left: 5px; }
        .modal-body input, .modal-body textarea { 
            width: 100%; padding: 15px; margin: 8px 0 18px; border-radius: 15px; 
            border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; 
            font-family: inherit; outline: none;
        }
        .modal-body textarea { height: 100px; resize: none; font-size: 0.85rem; }

        .btn-save { width: 100%; padding: 18px; background: #007bff; color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 1rem; cursor: pointer; }
        .btn-cancel { width: 100%; background: none; border: none; margin-top: 15px; color: #ef4444; font-weight: 800; cursor: pointer; }

        #loading-info { text-align: center; padding: 50px; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <div class="btn-back" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <span style="font-weight: 900; font-size: 1.1rem;">edit data produk</span>
    </div>

    <div class="content">
        <div id="loading-info">memuat produk anda...</div>
        <div class="grid" id="product-grid"></div>
    </div>

    <div id="modal-edit">
        <div class="modal-body">
            <h2 style="margin: 0 0 20px; font-weight: 900;">edit detail</h2>
            
            <input type="hidden" id="edit-id">
            <input type="hidden" id="edit-folder">

            <label>nama produk</label>
            <input type="text" id="edit-nama" placeholder="nama produk">

            <label>harga (rp)</label>
            <input type="number" id="edit-harga" placeholder="contoh: 50000">

            <label>deskripsi produk</label>
            <textarea id="edit-deskripsi" placeholder="jelaskan detail produk..."></textarea>

            <button class="btn-save" onclick="simpanPerubahan()">simpan perubahan</button>
            <button class="btn-cancel" onclick="closeModal()">batal</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myToken = localStorage.getItem('sessionToken'); 

        function loadProduk() {
            if(!myToken) return window.location.href = 'login.html';

            // Menarik dari folder products
            db.ref('products').on('value', (snap) => {
                const grid = document.getElementById('product-grid');
                const loader = document.getElementById('loading-info');
                grid.innerHTML = "";
                loader.style.display = 'none';

                if(snap.exists()){
                    snap.forEach(child => {
                        let p = child.val();
                        // Hanya produk milik kita
                        if(p.ownerToken === myToken) {
                            grid.innerHTML += `
                                <div class="p-card" onclick="openEdit('${child.key}', '${p.nama}', ${p.harga}, \`${p.deskripsi || ''}\`)">
                                    <img src="${p.foto || '../logo/joki.jpg'}">
                                    <div style="padding: 0 5px;">
                                        <span style="font-size:0.8rem; font-weight:800; color:#1e293b; display:block;">${p.nama}</span>
                                        <span style="font-size:0.9rem; font-weight:900; color:#007bff">rp ${(p.harga || 0).toLocaleString('id-ID')}</span>
                                    </div>
                                </div>
                            `;
                        }
                    });
                } else {
                    grid.innerHTML = '<div style="grid-column:span 2; color:#94a3b8; text-align:center;">belum ada produk.</div>';
                }
            });
        }

        function openEdit(key, nama, harga, deskripsi) {
            document.getElementById('edit-id').value = key;
            document.getElementById('edit-nama').value = nama;
            document.getElementById('edit-harga').value = harga;
            document.getElementById('edit-deskripsi').value = deskripsi;
            document.getElementById('modal-edit').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-edit').style.display = 'none'; }

        function simpanPerubahan() {
            const key = document.getElementById('edit-id').value;
            const namaBaru = document.getElementById('edit-nama').value;
            const hargaBaru = parseInt(document.getElementById('edit-harga').value);
            const deskripsiBaru = document.getElementById('edit-deskripsi').value;

            if(!namaBaru || !hargaBaru) return alert("nama dan harga tidak boleh kosong!");

            db.ref(`products/${key}`).update({
                nama: namaBaru,
                harga: hargaBaru,
                deskripsi: deskripsiBaru
            }).then(() => {
                alert("produk berhasil diupdate!");
                closeModal();
            }).catch((err) => {
                alert("gagal update: " + err.message);
            });
        }

        window.onload = loadProduk;
    </script>
</body>
</html>
