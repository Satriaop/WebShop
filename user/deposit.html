<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deposit - sat store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            text-transform: lowercase; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        .depo-container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .depo-card { 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.03); 
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        h3 { font-weight: 800; color: #1e293b; margin-top: 0; font-size: 1.4rem; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-weight: 700; font-size: 0.75rem; color: #64748b; margin-bottom: 8px; display: block; margin-left: 5px; }

        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            border: 2px solid #f1f5f9; 
            background: #f8fafc;
            text-align: center; 
            font-weight: 800; 
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: 0.3s;
            color: #1e293b;
        }

        input:focus { outline: none; border-color: #1a1a1a; background: white; }

        .qris-box { display: none; margin-top: 10px; }
        .qris-img-wrapper {
            background: white;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            margin-bottom: 15px;
        }
        .qris-img { width: 100%; border-radius: 10px; display: block; }

        .upload-area { 
            border: 2px dashed #cbd5e1; 
            padding: 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            background: #f8fafc; 
            margin-top: 10px; 
            position: relative;
            transition: 0.3s;
        }

        .upload-area:hover { border-color: #1a1a1a; background: #f1f5f9; }

        #preview-img { width: 100%; border-radius: 15px; display: none; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 18px; 
            border: none; 
            background: #1a1a1a; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #94a3b8; transform: none; }

        .btn-wa { 
            background: #25d366; 
            display: none; 
            text-decoration: none; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .info-text { font-size: 0.7rem; color: #ef4444; font-weight: 700; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="depo-container">
    <div class="depo-card">
        <h3>💰 isi saldo</h3>
        
        <div id="step-1">
            <div class="input-group">
                <label>jumlah deposit (rp)</label>
                <input type="number" id="nominal" placeholder="min. 10.000">
            </div>
            <button class="btn" onclick="showQRIS()">lanjut ke pembayaran</button>
        </div>

        <div id="step-2" class="qris-box">
            <div class="qris-img-wrapper">
                <img src="https://i.ibb.co.com/0Rnz0P74/IMG-20260505-WA0059.jpg" class="qris-img">
            </div>
            <span class="info-text">*silahkan scan qris di atas & bayar sesuai nominal</span>
            
            <div class="input-group" style="margin-top: 20px;">
                <label>upload bukti transfer</label>
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-cloud-arrow-up" id="icon-camera" style="font-size: 2rem; color: #64748b;"></i>
                    <p id="upload-text" style="font-size: 0.8rem; font-weight: 700; margin: 10px 0; color: #64748b;">pilih foto bukti transfer</p>
                    <img id="preview-img">
                    <input type="file" id="file-input" hidden accept="image/*" onchange="previewFile()">
                </div>
            </div>

            <button id="btn-submit" class="btn" onclick="kirimKonfirmasi()">konfirmasi sekarang</button>
            
            <a id="btn-wa" class="btn btn-wa" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> hubungi admin (fast respon)
            </a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    let db;
    const firebaseConfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f"
    };

    function initFirebase() {
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        db = firebase.database();
    }
    initFirebase();

    function showQRIS() {
        const nom = document.getElementById('nominal').value;
        if (!nom || nom < 10000) return alert("minimal deposit rp 10.000");
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function previewFile() {
        const file = document.getElementById('file-input').files[0];
        const preview = document.getElementById('preview-img');
        const icon = document.getElementById('icon-camera');
        const text = document.getElementById('upload-text');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                icon.style.display = 'none';
                text.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    async function kirimKonfirmasi() {
        const token = localStorage.getItem('sessionToken');
        const nominal = document.getElementById('nominal').value;
        const file = document.getElementById('file-input').files[0];
        const btn = document.getElementById('btn-submit');
        
        if (!token) return alert("sesi habis, login kembali");
        if (!file) return alert("mohon upload bukti!");
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> memproses...';

        try {
            const formData = new FormData();
            formData.append("image", file);
            
            const res = await fetch("https://api.imgbb.com/1/upload?key=50145b1eaa1385c3d9549ebe496eb5b5", { 
                method: "POST", 
                body: formData 
            });
            
            const dataImg = await res.json();
            if (!dataImg.success) throw new Error("gagal upload gambar");
            
            const imageUrl = dataImg.data.url;
            const depoId = "depo-" + Date.now();

            await db.ref('pending_deposit/' + depoId).set({
                depoId, token, nominal: parseInt(nominal), imageUrl, status: "pending", time: new Date().toLocaleString()
            });

            alert("berhasil! saldo akan masuk setelah verifikasi.");
            
            const adminWA = "6288989822427";
            const pesan = `hallo admin, saya sudah deposit:\nid: ${depoId}\nnominal: rp ${parseInt(nominal).toLocaleString()}\nbukti: ${imageUrl}`;
            const btnWa = document.getElementById('btn-wa');
            btnWa.href = `https://wa.me/${adminWA}?text=${encodeURIComponent(pesan)}`;
            btnWa.style.display = 'flex';
            btn.style.display = 'none';

        } catch (e) { 
            alert("error: " + e.message); 
            btn.disabled = false;
            btn.innerText = "konfirmasi sekarang";
        }
    }
</script>
</body>
</html>
