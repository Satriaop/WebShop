<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>penambahan produk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; padding: 20px; text-transform: lowercase;
            padding-bottom: 80px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #1a1a1a; text-decoration: none; background: white; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: lowercase; margin-bottom: 8px; letter-spacing: 0.5px; margin-top: 10px; }
        input, textarea, select { 
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; 
            background: #f8fafc; outline: none; font-family: inherit; box-sizing: border-box; 
            margin-bottom: 15px; font-weight: 600; font-size: 0.85rem; transition: 0.3s;
            text-transform: lowercase;
        }
        input:focus, select:focus, textarea:focus { border-color: #007bff; background: white; }
        .merchant-badge {
            background: #eef2ff; border: 1px solid #e0e7ff; padding: 12px; border-radius: 15px;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            color: #4338ca; font-size: 0.75rem; font-weight: 700;
        }
        .upload-wrapper {
            width: 100%; aspect-ratio: 1/1; border: 2px dashed #e2e8f0; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; background: #f8fafc;
            margin-bottom: 20px;
        }
        #final-preview { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
        .upload-placeholder { text-align: center; color: #94a3b8; font-size: 0.8rem; font-weight: 600; }
        .upload-placeholder i { font-size: 2rem; color: #007bff; margin-bottom: 10px; }
        .secret-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 20px; border-radius: 20px; margin-top: 15px; margin-bottom: 20px; }
        .secret-box h4 { margin: 0 0 15px 0; font-size: 0.75rem; color: #c53030; text-transform: lowercase; display: flex; align-items: center; gap: 8px; }
        .action-area { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(240, 244, 248, 0.9); backdrop-filter: blur(10px); padding: 15px 20px 20px; box-sizing: border-box; z-index: 100; }
        .btn-submit { width: 100%; max-width: 460px; margin: 0 auto; display: block; padding: 18px; background: #1a1a1a; color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: lowercase; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="font-size: 1rem; margin: 0; font-weight: 900;">ajukan produk baru</h2>
    </div>

    <div class="card">
        <div class="merchant-badge">
            <i class="fa-solid fa-store"></i>
            <span>toko: <span id="shop-display">memuat...</span></span>
        </div>

        <label>foto produk :</label>
        <div class="upload-wrapper" onclick="document.getElementById('file-input').click()">
            <img id="final-preview">
            <div id="placeholder-content" class="upload-placeholder">
                <i class="fa-solid fa-image"></i>
                <br>pilih foto produk
            </div>
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="prosesfotoutuh(this)">
        </div>

        <label>nama produk :</label>
        <input type="text" id="nama-produk" placeholder="nama produk">

        <label>kategori :</label>
        <select id="kategori-produk">
            <option value="akun">akun</option>
            <option value="app prem">app prem</option>
            <option value="e-book">e-book</option>
            <option value="produk digital">produk digital</option>
            <option value="lain nya">lain nya</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>stok tersedia :</label>
                <input type="number" id="stok-produk" value="1">
            </div>
            <div>
                <label>id (otomatis) :</label>
                <input type="text" id="id-produk" readonly style="background: #e2e8f0;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>harga awal (rp) :</label>
                <input type="number" id="harga-awal" oninput="hitunghargafinal()">
            </div>
            <div>
                <label>diskon (%) :</label>
                <input type="number" id="persen-diskon" value="0" oninput="hitunghargafinal()">
            </div>
        </div>

        <label>harga jual akhir :</label>
        <input type="number" id="harga-final" readonly style="background: #e2e8f0; color: #007bff; font-weight: 800;">

        <label>deskripsi produk :</label>
        <textarea id="desc-produk" rows="4"></textarea>

        <div class="secret-box">
            <h4><i class="fa-solid fa-lock"></i> data akun rahasia</h4>
            <label>email / username :</label>
            <input type="text" id="email-akun">
            <label>kata sandi :</label>
            <input type="text" id="pass-akun">
            <label>status a2f :</label>
            <select id="a2f-status">
                <option value="off">off</option>
                <option value="on">on</option>
            </select>
            <label>informasi tambahan :</label>
            <textarea id="extra-info" rows="2"></textarea>
        </div>
    </div>
</div>

<div class="action-area">
    <button class="btn-submit" id="btn-save" onclick="ajukanproduk()">kirim pengajuan</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseconfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseconfig);
    const db = firebase.database();

    const currentuser = localStorage.getItem('sessionToken'); 
    const randomid = "prd-" + Date.now().toString().slice(-4);
    
    let currentshopname = "official store";
    let currentpaymentnum = "";
    let filetoupload = null;

    window.onload = function() {
        document.getElementById('id-produk').value = randomid;
        if(!currentuser) return window.location.href = 'login.html';

        db.ref('users/' + currentuser).once('value', (snap) => {
            if(snap.exists()){
                const d = snap.val();
                currentshopname = d.shopName || d.fullname || "official store";
                currentpaymentnum = d.paymentNumber || "";
                document.getElementById('shop-display').innerText = currentshopname;
            }
        });
    };

    function prosesfotoutuh(input) {
        if (input.files && input.files[0]) {
            filetoupload = input.files[0];
            const preview = document.getElementById('final-preview');
            preview.src = URL.createObjectURL(filetoupload);
            preview.style.display = 'block';
            document.getElementById('placeholder-content').style.display = 'none';
        }
    }

    function hitunghargafinal() {
        const awal = parseFloat(document.getElementById('harga-awal').value) || 0;
        const diskon = parseFloat(document.getElementById('persen-diskon').value) || 0;
        const final = document.getElementById('harga-final');
        final.value = awal > 0 ? Math.round(awal - (awal * diskon / 100)) : "";
    }

    async function ajukanproduk() {
        const btn = document.getElementById('btn-save');
        const nama = document.getElementById('nama-produk').value.trim();
        const stok = parseInt(document.getElementById('stok-produk').value);
        const hargajual = parseInt(document.getElementById('harga-final').value);

        if(!filetoupload || !nama || !stok || !hargajual) return alert("lengkapi data produk!");

        btn.disabled = true;
        btn.innerText = "memproses...";

        try {
            const userref = db.ref('users/' + currentuser);
            const usersnap = await userref.get();
            const userdata = usersnap.val();
            const currentlimit = parseInt(userdata.saleLimit || 0);

            if (currentlimit <= 0) {
                alert("limit upload habis!");
                btn.disabled = false; btn.innerText = "kirim pengajuan";
                return;
            }

            const formdata = new FormData();
            formdata.append("image", filetoupload);
            const resimg = await fetch("https://api.imgbb.com/1/upload?key=50145b1eaa1385c3d9549ebe496eb5b5", {
                method: "POST",
                body: formdata
            }).then(r => r.json());

            if(resimg.success) {
                await userref.update({ saleLimit: currentlimit - 1 });
                await db.ref('pending_products').push({
                    productId: randomid,
                    nama: nama,
                    kategori: document.getElementById('kategori-produk').value,
                    foto: resimg.data.url,
                    stok: stok,
                    harga: hargajual,
                    deskripsi: document.getElementById('desc-produk').value,
                    uploadBy: currentshopname,
                    ownerToken: currentuser,
                    ownerDana: currentpaymentnum,
                    status: "pending",
                    timestamp: Date.now(),
                    akun: {
                        email: document.getElementById('email-akun').value,
                        pass: document.getElementById('pass-akun').value,
                        a2f: document.getElementById('a2f-status').value,
                        tambahan: document.getElementById('extra-info').value
                    }
                });
                alert("berhasil diajukan!");
                window.location.href = 'dashboard.html';
            }
        } catch (e) {
            alert("error: " + e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
