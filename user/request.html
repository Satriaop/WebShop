<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>request owner role</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        body { 
            background: #f0f4f8; 
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
            color: #1a1a1a; 
            font-family: 'inter', sans-serif; 
            margin: 0; 
            text-transform: lowercase; 
            overflow-x: hidden;
        }

        .header-back {
            height: 75px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0; z-index: 999;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .btn-back {
            width: 45px; height: 45px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1e293b;
        }

        .content { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* --- BANNER SLIDER STYLE (SAMA DENGAN DASHBOARD) --- */
        .slider-container {
            width: 100%;
            position: relative;
            margin-bottom: 25px;
            display: none;
            overflow: hidden;
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
            border-radius: 20px;
        }
        .slide {
            min-width: 100%;
            position: relative;
        }
        .slide img {
            width: 100%;
            height: 160px; 
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .slide-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px 15px 10px;
            border-radius: 0 0 20px 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }
        .dot {
            width: 6px; height: 6px;
            background: #cbd5e1;
            border-radius: 50%;
            transition: 0.3s;
        }
        .dot.active { background: #007bff; width: 15px; border-radius: 10px; }

        /* --- FORM STYLE --- */
        .form-card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04); 
            border: 1px solid #fff;
            animation: fadein 0.5s ease;
        }

        .input-group label {
            display: block;
            font-weight: 800;
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .input-group textarea { 
            width: 100%; 
            padding: 15px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 15px; 
            outline: none; 
            font-family: inherit; 
            box-sizing: border-box;
            resize: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: #1a1a1a;
            color: white;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header-back">
        <div class="btn-back" onclick="window.location.href='dashboard.html'">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <span style="margin-left: 15px; font-weight: 800; font-size: 0.9rem; color: #1e293b;">kembali ke dashboard</span>
    </div>

    <div class="content">
        <div id="slider-container" class="slider-container">
            <div id="slider-wrapper" class="slider-wrapper"></div>
            <div id="slider-dots" class="slider-dots"></div>
        </div>

        <div class="form-card">
            <div style="font-weight: 900; font-size: 1rem; color: #1a1a1a; margin-bottom: 20px; text-transform: uppercase;">
                <i class="fa-solid fa-crown" style="color: #eab308; margin-right: 8px;"></i> form request owner
            </div>
            
            <div class="input-group">
                <label>jelaskan alasan kamu ingin menjadi owner :</label>
                <textarea id="req-desc" rows="6" placeholder="tulis alasan kamu di sini..."></textarea>
            </div>

            <button class="btn-submit" onclick="submitRequest()">kirim permintaan</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            authDomain: "market-d978f.firebaseapp.com",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
            storageBucket: "market-d978f.firebasestorage.app",
            messagingSenderId: "291695486607",
            appId: "1:291695486607:web:dd860d16639b47c163f2fa"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentSlide = 0;
        let slideInterval;

        // --- BANNER SLIDER LOGIC ---
        function initBannerSlider() {
            db.ref('banner_promo').on('value', (snapshot) => {
                const wrapper = document.getElementById('slider-wrapper');
                const dotsContainer = document.getElementById('slider-dots');
                const container = document.getElementById('slider-container');
                
                wrapper.innerHTML = "";
                dotsContainer.innerHTML = "";
                
                if (snapshot.exists()) {
                    container.style.display = 'block';
                    let index = 0;
                    snapshot.forEach((child) => {
                        const data = child.val();
                        wrapper.innerHTML += `
                            <div class="slide">
                                <img src="${data.image_url}">
                                <div class="slide-title">${data.title || ""}</div>
                            </div>
                        `;
                        dotsContainer.innerHTML += `<div class="dot ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></div>`;
                        index++;
                    });
                    startAutoSlide(index);
                } else {
                    container.style.display = 'none';
                }
            });
        }

        function goToSlide(n) {
            const wrapper = document.getElementById('slider-wrapper');
            const dots = document.querySelectorAll('.dot');
            if (!dots.length) return;
            const totalSlides = dots.length;
            if (n >= totalSlides) n = 0;
            if (n < 0) n = totalSlides - 1;
            currentSlide = n;
            wrapper.style.transform = `translateX(-${n * 100}%)`;
            dots.forEach(d => d.classList.remove('active'));
            dots[n].classList.add('active');
        }

        function startAutoSlide(total) {
            if(slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                goToSlide(currentSlide + 1);
            }, 4000);
        }

        // --- SUBMIT REQUEST LOGIC ---
        async function submitRequest() {
            const desc = document.getElementById('req-desc').value.trim();
            const token = localStorage.getItem('sessionToken');
            
            if (!token) return window.location.href = 'login.html';
            if (!desc) return alert("tulis alasannya dulu kak");

            db.ref('users/' + token).once('value', (snap) => {
                const user = snap.val();
                if (!user) return alert("gagal mengambil data user");
                
                db.ref('role_requests/' + token).set({
                    name: user.fullname,
                    phone: user.phone,
                    email: token.replace(/,/g, '.'),
                    desc: desc,
                    status: 'pending',
                    timestamp: Date.now()
                }).then(() => {
                    alert("permintaan terkirim, tunggu admin cek ya!");
                    window.location.href = 'dashboard.html';
                }).catch((e) => alert("error: " + e.message));
            });
        }

        window.onload = () => {
            initBannerSlider();
        };
    </script>
</body>
</html>
