<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hapus Produk</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; text-transform: lowercase; overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            height: 70px; display: flex; align-items: center; padding: 0 20px;
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .btn-back {
            width: 42px; height: 42px; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-right: 15px; color: #1e293b;
        }

        .content { padding: 15px; max-width: 500px; margin: 0 auto; }

        .list-container { display: flex; flex-direction: column; gap: 12px; animation: fadein 0.5s ease; }

        .p-item {
            background: white; padding: 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        .p-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #f8fafc; }

        .p-info { flex: 1; }
        .p-info h4 { margin: 0; font-size: 0.85rem; font-weight: 800; color: #1e293b; }
        .p-info span { font-size: 0.75rem; font-weight: 900; color: #007bff; }

        .btn-del {
            width: 45px; height: 45px; background: #fee2e2; color: #ef4444;
            border: none; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            font-size: 1.1rem; transition: 0.2s;
        }
        .btn-del:active { transform: scale(0.9); background: #ef4444; color: white; }

        #loading-info { text-align: center; padding: 50px; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <div class="btn-back" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <span style="font-weight: 900; font-size: 1.1rem;">hapus produk</span>
    </div>

    <div class="content">
        <div id="loading-info">menghubungkan data...</div>
        <div class="list-container" id="product-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myToken = localStorage.getItem('sessionToken'); 

        function loadProduk() {
            if(!myToken) return window.location.href = 'login.html';

            db.ref('products').on('value', (snap) => {
                const list = document.getElementById('product-list');
                const loader = document.getElementById('loading-info');
                list.innerHTML = "";
                loader.style.display = 'none';

                if(snap.exists()){
                    let found = false;
                    snap.forEach(child => {
                        let p = child.val();
                        if(p.ownerToken === myToken) {
                            found = true;
                            list.innerHTML += `
                                <div class="p-item">
                                    <img src="${p.foto || '../logo/joki.jpg'}">
                                    <div class="p-info">
                                        <h4>${p.nama}</h4>
                                        <span>rp ${(p.harga || 0).toLocaleString('id-ID')}</span>
                                    </div>
                                    <button class="btn-del" onclick="hapusProduk('${child.key}')">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            `;
                        }
                    });
                    if(!found) list.innerHTML = '<div style="text-align:center; padding:50px; color:#94a3b8;">kamu belum punya produk.</div>';
                } else {
                    list.innerHTML = '<div style="text-align:center; padding:50px; color:#94a3b8;">database kosong.</div>';
                }
            });
        }

        function hapusProduk(key) {
            if(confirm("yakin ingin menghapus produk ini selamanya?")) {
                db.ref(`products/${key}`).remove()
                .then(() => {
                    alert("produk berhasil dihapus!");
                })
                .catch((err) => {
                    alert("gagal hapus: " + err.message);
                });
            }
        }

        window.onload = loadProduk;
    </script>
</body>
</html>
