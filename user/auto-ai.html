<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Assistant - SAT STORE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #3b82f6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed; /* Mengunci layar agar tidak goyang/gerak */
        }

        body { 
            background: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; /* Mengikuti tinggi layar saat keyboard muncul */
            color: var(--text-main); 
        }

        .chat-header { 
            padding: 15px 20px; 
            background: #1e293b;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-header h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            -webkit-overflow-scrolling: touch; /* Scroll halus di iOS */
        }

        .msg { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 2px;
        }

        .ai-msg { 
            align-self: flex-start; 
            background: var(--panel-bg); 
            color: var(--text-main); 
            border-bottom-left-radius: 2px; 
            border: 1px solid var(--border);
        }

        .input-wrapper {
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)); /* Support notch iPhone */
            background: #1e293b;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-area { 
            display: flex; 
            gap: 10px; 
            background: #0f172a;
            padding: 5px 5px 5px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            outline: none; 
            font-family: inherit;
            padding: 10px 0;
            font-size: 16px; /* Mencegah auto-zoom di iOS */
        }
        
        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 10px; 
            cursor: pointer;
            flex-shrink: 0;
        }

        .typing { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; margin-left: 5px; }

        #chat-container::-webkit-scrollbar { width: 3px; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<div class="chat-header">
    <i class="fa-solid fa-robot" style="color: var(--accent); font-size: 1.2rem;"></i>
    <div style="flex: 1">
        <h3>SAT STORE AI</h3>
        <span style="font-size: 0.65rem; color: #4ade80; font-weight: 600;">● ONLINE</span>
    </div>
</div>

<div id="chat-container">
    <div class="msg ai-msg">yo bro! selamat datang di sat store. ada yang bisa dibantu? 🔥</div>
</div>

<div class="input-wrapper">
    <div id="typing-indicator" style="display: none;">
        <div class="typing">ai lagi ngetik...</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="tulis sesuatu..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const apiKeys = [
        "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",
        "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",
        "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"
    ];

    let db;
    let cachedProducts = "data produk sedang dimuat...";

    window.onload = () => {
        try {
            const config = window.firebaseConfig || { databaseURL: "https://your-project.firebaseio.com" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            preFetchData();
        } catch (e) { console.warn("Firebase offline"); }
    };

    async function preFetchData() {
        if (!db) return;
        try {
            const snap = await db.ref('products').once('value');
            if (snap.exists()) {
                let list = "";
                const data = snap.val();
                Object.values(data).forEach(p => {
                    if(p.nama) list += `- ${p.nama} (Rp${p.harga}, Stok:${p.stok})\n`;
                });
                cachedProducts = list || "stok kosong";
            }
        } catch(e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const indicator = document.getElementById('typing-indicator');
        const text = input.value.trim();

        if (!text || btn.disabled) return;

        addMsg(text, 'user-msg');
        input.value = "";
        btn.disabled = true;
        indicator.style.display = "block";
        scrollToBottom();

        const randomKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${randomKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: `kamu adalah asisten pintar SAT STORE. 
                    Gunakan bahasa gaul anak muda, ramah, dan informatif. 
                    Data produk saat ini: ${contextData}. 
                    Jika user ingin beli, arahkan ke menu produk atau hubungi admin di 6188989822427. 
                    Jika bertanya di luar topik, jawab dengan santai tapi tetap arahkan ke toko.` },
                        { role: "user", content: text }
                    ],
                    max_tokens: 150
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content || "waduh, coba lagi bro.";
            addMsg(reply, 'ai-msg');
        } catch (e) {
            addMsg("koneksi bermasalah bro.", 'ai-msg');
        } finally {
            btn.disabled = false;
            indicator.style.display = "none";
            scrollToBottom();
        }
    }

    function addMsg(t, c) {
        const container = document.getElementById('chat-container');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerText = t.toLowerCase();
        container.appendChild(d);
    }

    function scrollToBottom() {
        const c = document.getElementById('chat-container');
        c.scrollTop = c.scrollHeight;
    }

    // Auto scroll saat input difokuskan (untuk mobile)
    document.getElementById('user-input').addEventListener('focus', () => {
        setTimeout(scrollToBottom, 300);
    });

    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
