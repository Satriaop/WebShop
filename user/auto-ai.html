<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai assistant - sat store</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; text-transform: lowercase; }
        .chat-header { padding: 20px; background: #1e293b; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        .chat-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid #334155; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; align-items: center; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.9); }
        button:disabled { background: #475569; opacity: 0.6; }
        .loading-chat { font-style: italic; font-size: 0.75rem; color: #94a3b8; align-self: flex-start; margin-left: 5px; }
    </style>
</head>
<body>

<div class="chat-header">
    <a href="dashboard.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="status-dot"></div>
    <h3>sat store - ai assistant</h3>
</div>

<div id="chat-container">
    <div class="msg ai-msg">hallo! ada yang bisa saya bantu tentang produk di sat store? tanya stok atau harga juga bisa lho! 🚀</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="ketik pesan anda..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script>
    // 1. Definisikan API Keys & Variabel di paling atas (WAJIB)
    const part1 = "gsk_";
    const keys = [
        part1 + "B71OpeISm5H9HSI9x3uAWGdyb3FY5nAJNqaSeusVnPHZbjK3NyXK",
        part1 + "i6V2S8FcqiR5hz0PdPggWGdyb3FYYm1bDPNxOOyqWtAiSZnekbOw",
        part1 + "PCvVdMUthQbvwutBhR9BWGdyb3FYGbLtlNEIVXoXd76RSV7YzHa3"
    ];
    let currentKeyIndex = 0;
    let db;

    // 2. Inisialisasi Firebase
    function initApp() {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
            console.log("ai system ready");
        } catch (e) {
            console.error("firebase error:", e);
        }
    }
    initApp();

    // 3. Ambil Data Produk Realtime
    async function getProductData() {
        try {
            const snapshot = await db.ref('products').once('value');
            if (!snapshot.exists()) return "maaf, saat ini stok produk sedang kosong.";
            
            let list = "daftar produk sat store:\n";
            const allData = snapshot.val();
            
            for (let owner in allData) {
                for (let id in allData[owner]) {
                    const p = allData[owner][id];
                    list += `- ${p.nama} | harga: rp ${parseInt(p.harga).toLocaleString()} | stok: ${p.stok}\n`;
                }
            }
            return list;
        } catch (e) {
            return "data produk tidak terbaca.";
        }
    }

    // 4. Fungsi Kirim Pesan
    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const btn = document.getElementById('send-btn');
        const query = inputEl.value.trim();

        if (!query) return;

        // Tampilkan pesan user
        container.innerHTML += `<div class="msg user-msg">${query}</div>`;
        inputEl.value = "";
        container.scrollTop = container.scrollHeight;

        // Loading state
        btn.disabled = true;
        const loadingMsg = document.createElement('div');
        loadingMsg.className = "loading-chat";
        loadingMsg.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ai sedang mengetik...';
        container.appendChild(loadingMsg);
        container.scrollTop = container.scrollHeight;

        try {
            const contextData = await getProductData();
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${keys[currentKeyIndex]}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { 
                            role: "system", 
                            content: `kamu adalah asisten pintar SAT STORE. 
                            Gunakan bahasa gaul anak muda, ramah, dan informatif. 
                            Data produk saat ini: ${contextData}. 
                            Jika user ingin beli, arahkan ke menu produk atau hubungi admin di 6188989822427. 
                            Jika bertanya di luar topik, jawab dengan santai tapi tetap arahkan ke toko.` 
                        },
                        { role: "user", content: query }
                    ]
                })
            });

            const result = await response.json();
            
            if (result.error) {
                // Rotasi Key jika limit tercapai
                currentKeyIndex = (currentKeyIndex + 1) % keys.length;
                throw new Error("koneksi sedikit sibuk, coba kirim ulang ya!");
            }

            const aiReply = result.choices[0].message.content;
            loadingMsg.remove();
            container.innerHTML += `<div class="msg ai-msg">${aiReply}</div>`;
            
        } catch (err) {
            loadingMsg.innerHTML = `<span style="color:#ef4444">ops! ${err.message}</span>`;
            btn.disabled = false;
        }

        btn.disabled = false;
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
