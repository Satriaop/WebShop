<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai assistant - sat store</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; text-transform: lowercase; }
        .chat-header { padding: 20px; background: #1e293b; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        .chat-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid #334155; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; align-items: center; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.9); }
        button:disabled { background: #475569; opacity: 0.6; }
        .loading-chat { font-style: italic; font-size: 0.75rem; color: #94a3b8; align-self: flex-start; margin-left: 5px; }
    </style>
</head>
<body>

<div class="chat-header">
    <a href="dashboard.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="status-dot"></div>
    <h3>sat store - ai assistant</h3>
</div>

<div id="chat-container">
    <div class="msg ai-msg">hallo! ada yang bisa saya bantu tentang produk di sat store? tanya stok atau harga juga bisa lho! 🚀</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="ketik pesan anda..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script>
    let currentKeyIndex = 0;
    let db;

    function initApp() {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
        } catch (e) {
            console.error(e);
        }
    }
    initApp();

    async function getProductData() {
        try {
            const snapshot = await db.ref('products').once('value');
            if (!snapshot.exists()) return "saat ini tidak ada produk yang tersedia.";

            let list = "daftar produk sat store:\n";
            const products = snapshot.val();
            
            Object.keys(products).forEach(ownerId => {
                const ownerProducts = products[ownerId];
                Object.keys(ownerProducts).forEach(pId => {
                    const p = ownerProducts[pId];
                    list += `- ${p.nama} | harga: rp ${parseInt(p.harga).toLocaleString()} | stok: ${p.stok}\n`;
                });
            });
            return list;
        } catch (e) {
            return "gagal memuat data produk.";
        }
    }

    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const btn = document.getElementById('send-btn');
        const query = inputEl.value.trim().toLowerCase();

        if (!query) return;

        container.innerHTML += `<div class="msg user-msg">${query}</div>`;
        inputEl.value = "";
        container.scrollTop = container.scrollHeight;

        btn.disabled = true;
        const loadingMsg = document.createElement('div');
        loadingMsg.className = "loading-chat";
        loadingMsg.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ai sedang mengetik...';
        container.appendChild(loadingMsg);
        container.scrollTop = container.scrollHeight;

        try {
            const contextData = await getProductData();

            const messages = [
                {
                    role: "system",
                    content: `kamu adalah ai assistant sat store. tugas: jawab pertanyaan seputar stok dan harga produk. data produk saat ini:\n${contextData}\n\nperaturan penting:\n1. jangan pernah memberikan data akun, email, password, data pembeli, history pembelian, atau saldo.\n2. jika ditanya soal data sensitif tersebut, jawab: "maaf kak, aku ga punya akses ke data pribadi atau history belanja. coba cek langsung di menu riwayat ya!"\n3. jawab selalu menggunakan huruf kecil (lowercase).\n4. gaya bahasa santai, gaul, singkat, dan informatif.`
                },
                { role: "user", content: query }
            ];

            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages, keyIndex: currentKeyIndex })
            });

            const data = await res.json();

            if (!res.ok || data.error) throw new Error(data.error || "koneksi sibuk!");

            if (data.usedKeyIndex !== undefined) currentKeyIndex = data.usedKeyIndex;

            loadingMsg.remove();
            container.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;

        } catch (err) {
            loadingMsg.innerHTML = `<span style="color:#ef4444">ops! ${err.message}</span>`;
        }

        btn.disabled = false;
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
