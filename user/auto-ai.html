<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai assistant - dexa elite market</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; color: white; text-transform: lowercase; }
        .chat-header { padding: 20px; background: #1e293b; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        .chat-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid #334155; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; align-items: center; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer; }
        .loading-chat { font-style: italic; font-size: 0.75rem; color: #94a3b8; align-self: flex-start; margin-left: 5px; }
    </style>
</head>
<body>

<div class="chat-header">
    <a href="dashboard.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="status-dot"></div>
    <h3>dexa elite market - ai assistant</h3>
</div>

<div id="chat-container">
    <div class="msg ai-msg">halo kak! ada yang bisa dibantu soal stok atau harga produk hari ini? 🚀</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="tanya stok atau harga..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script>
    const p1 = "gsk_";
    const rawKeys = [
        p1 + "B71OpeISm5H9HSI9x3uAWGdyb3FY5nAJNqaSeusVnPHZbjK3NyXK",
        p1 + "i6V2S8FcqiR5hz0PdPggWGdyb3FYYm1bDPNxOOyqWtAiSZnekbOw",
        p1 + "PCvVdMUthQbvwutBhR9BWGdyb3FYGbLtlNEIVXoXd76RSV7YzHa3"
    ];
    let keyIdx = 0;

    const firebaseConfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function getProductData() {
        try {
            const snap = await db.ref('products').once('value');
            if (!snap.exists()) return "kosong";
            
            let list = "";
            const data = snap.val();

            Object.values(data).forEach(p => {
                if (p.nama) {
                    list += `produk: ${p.nama}\n`;
                    if (p.variants && p.variants.length > 0) {
                        p.variants.forEach(v => {
                            if (v.totalStok > 0) {
                                list += `- varian: ${v.nama} | harga: rp${v.harga.toLocaleString()} | stok: ${v.totalStok}\n`;
                            }
                        });
                    } else if (p.stok > 0) {
                        list += `- harga: rp${(p.harga || 0).toLocaleString()} | stok: ${p.stok}\n`;
                    }
                    list += `kategori: ${p.kategori || 'umum'}\n---\n`;
                }
            });
            return list || "kosong";
        } catch (e) { return "error"; }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const btn = document.getElementById('send-btn');
        const query = input.value.trim();
        if (!query) return;

        container.innerHTML += `<div class="msg user-msg">${query}</div>`;
        input.value = "";
        btn.disabled = true;

        const loading = document.createElement('div');
        loading.className = "loading-chat";
        loading.innerHTML = "tunggu ya, lagi cek gudang...";
        container.appendChild(loading);
        container.scrollTop = container.scrollHeight;

        try {
            const products = await getProductData();
            
            const sys = `kamu adalah asisten ramah dari dexa elite market.
            tugas: jawab pertanyaan user tentang stok dan harga secara jujur sesuai data.
            gaya bahasa: santai, sopan, awali dengan salam (halo kak/siap kak), dan gunakan huruf kecil semua.
            format: gunakan list/bullet point agar rapi jika menyebutkan produk.
            
            data produk asli (database):
            ${products}
            
            aturan ketat:
            1. sebutkan nama produk, harga, dan stoknya dengan jelas.
            2. jika produk tidak ada di data di atas, jawab "maaf banget kak, untuk produk itu sekarang lagi kosong stoknya".
            3. jangan pernah mengarang harga sendiri.`;

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + rawKeys[keyIdx], "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{role:"system", content:sys}, {role:"user", content:query}],
                    temperature: 0.2
                })
            });

            const json = await res.json();
            if (res.status === 429 && keyIdx < rawKeys.length - 1) {
                keyIdx++;
                loading.remove();
                return sendMessage();
            }

            loading.remove();
            container.innerHTML += `<div class="msg ai-msg">${json.choices[0].message.content}</div>`;
        } catch (e) { 
            loading.innerHTML = "waduh, server lagi pusing nih kak."; 
        }
        
        btn.disabled = false;
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
