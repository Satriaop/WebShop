<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelola Produk Saya</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; text-transform: lowercase; overflow-x: hidden; width: 100%;
        }

        .header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            height: 70px; display: flex; align-items: center; padding: 0 20px;
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .btn-back {
            width: 42px; height: 42px; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-right: 15px; color: #1e293b;
        }

        .content { padding: 15px; max-width: 500px; margin: 0 auto; }

        .search-wrapper {
            background: white; padding: 2px; border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid #fff;
            margin-bottom: 20px; display: flex; align-items: center;
        }
        .search-wrapper input { width: 100%; padding: 14px 10px; border: none; outline: none; background: transparent; font-size: 0.85rem; }

        .kat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px; }
        .kat-scroll::-webkit-scrollbar { display: none; }
        .kat-pill { padding: 10px 20px; background: white; border-radius: 16px; font-size: 0.75rem; font-weight: 800; white-space: nowrap; border: 1px solid #fff; color: #64748b; }
        .kat-pill.active { background: #1a1a1a; color: white; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; animation: fadein 0.5s ease; }
        .p-card { background: white; padding: 10px; border-radius: 22px; position: relative; border: 1px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; margin-bottom: 10px; background: #f8fafc; }
        
        .manage-btns { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 5px; }
        .btn-manage { width: 32px; height: 32px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; color: white; }
        .btn-e { background: #007bff; }
        .btn-d { background: #ff4757; }

        #modal-edit { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 1000; }
        .modal-body { background: white; width: 100%; padding: 25px; border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-body input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; font-family: inherit; }
        .btn-save { width: 100%; padding: 18px; background: #1a1a1a; color: white; border: none; border-radius: 15px; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="btn-back" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <span style="font-weight: 900; font-size: 1.1rem;">produk saya</span>
    </div>

    <div class="content">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="margin-left:15px; color:#94a3b8"></i>
            <input type="text" id="pencarian" placeholder="cari di koleksi saya..." oninput="jalankanFilter()">
        </div>

        <div class="kat-scroll">
            <div class="kat-pill active" onclick="setKategori('semua', this)">semua</div>
            <div class="kat-pill" onclick="setKategori('AKUN', this)">akun</div>
            <div class="kat-pill" onclick="setKategori('APP PREM', this)">app prem</div>
            <div class="kat-pill" onclick="setKategori('JASA', this)">jasa joki</div>
        </div>

        <div id="loading-info" style="text-align:center; padding:50px; color:#94a3b8; font-weight:700;">menghubungkan database...</div>
        <div class="grid" id="product-grid"></div>
    </div>

    <div id="modal-edit">
        <div class="modal-body">
            <h3 style="margin:0 0 20px 0">edit produk</h3>
            <input type="hidden" id="edit-id">
            <input type="hidden" id="edit-folder">
            <label style="font-size:0.7rem; font-weight:800; color:#94a3b8">harga baru (rp)</label>
            <input type="number" id="edit-harga">
            <label style="font-size:0.7rem; font-weight:800; color:#94a3b8">stok tersedia</label>
            <input type="number" id="edit-stok">
            <button class="btn-save" onclick="simpanPerubahan()">simpan perubahan</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:15px; color:red; font-weight:700">batal</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myToken = localStorage.getItem('sessionToken'); 

        let masterProduk = [];
        let filterSekarang = 'semua';

        function loadProduk() {
            if(!myToken) return window.location.href = 'login.html';

            const paths = ['products', 'pending_products', 'services'];
            let loaded = 0;
            masterProduk = [];

            paths.forEach(path => {
                db.ref(path).on('value', (snap) => {
                    // Bersihkan data lama dari folder ini
                    masterProduk = masterProduk.filter(p => p._path !== path);
                    
                    if(snap.exists()){
                        snap.forEach(child => {
                            let data = child.val();
                            // FILTER STRICT: Hanya masukkan jika ownerToken COCOK
                            if(data.ownerToken === myToken) {
                                data._key = child.key;
                                data._path = path;
                                masterProduk.push(data);
                            }
                        });
                    }
                    loaded++;
                    if(loaded >= 3) {
                        document.getElementById('loading-info').style.display = 'none';
                        jalankanFilter();
                    }
                });
            });
        }

        function jalankanFilter() {
            const cari = document.getElementById('pencarian').value.toLowerCase();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";

            const hasil = masterProduk.filter(p => {
                const matchKat = filterSekarang === 'semua' || (p.kategori || "").toLowerCase().includes(filterSekarang.toLowerCase());
                const matchName = (p.nama || "").toLowerCase().includes(cari);
                return matchKat && matchName;
            });

            if(hasil.length === 0) {
                grid.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 50px; color: #94a3b8; font-size: 0.8rem;">produk tidak ditemukan.</div>';
                return;
            }

            hasil.forEach(p => {
                grid.innerHTML += `
                    <div class="p-card">
                        <img src="${p.foto || '../logo/joki.jpg'}">
                        <div class="manage-btns">
                            <button class="btn-manage btn-e" onclick="openEdit('${p._path}', '${p._key}', ${p.harga}, ${p.stok})"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-manage btn-d" onclick="hapusProduk('${p._path}', '${p._key}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div style="padding: 0 2px;">
                            <span style="font-size:0.6rem; color:#007bff; font-weight:900; text-transform:uppercase">${p.kategori}</span>
                            <span style="font-size:0.8rem; font-weight:800; color:#1e293b; display:block; margin:4px 0">${p.nama}</span>
                            <span style="font-size:0.95rem; font-weight:900; color:#1a1a1a">rp ${(p.harga || 0).toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                `;
            });
        }

        function setKategori(kat, el) {
            filterSekarang = kat;
            document.querySelectorAll('.kat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            jalankanFilter();
        }

        function openEdit(path, key, harga, stok) {
            document.getElementById('edit-folder').value = path;
            document.getElementById('edit-id').value = key;
            document.getElementById('edit-harga').value = harga;
            document.getElementById('edit-stok').value = stok;
            document.getElementById('modal-edit').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-edit').style.display = 'none'; }

        function simpanPerubahan() {
            const path = document.getElementById('edit-folder').value;
            const key = document.getElementById('edit-id').value;
            const harga = parseInt(document.getElementById('edit-harga').value);
            const stok = parseInt(document.getElementById('edit-stok').value);

            db.ref(`${path}/${key}`).update({ harga, stok })
            .then(() => { closeModal(); });
        }

        function hapusProduk(path, key) {
            if(confirm("hapus produk ini dari list?")) {
                db.ref(`${path}/${key}`).remove();
            }
        }

        window.onload = loadProduk;
    </script>
</body>
</html>
