<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Block API Key</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding: 20px; text-transform: lowercase; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h2 { font-weight: 800; font-size: 1.2rem; color: #0f172a; margin-bottom: 5px; }
        p { font-size: 0.8rem; color: #64748b; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        
        select {
            width: 100%; padding: 15px; border-radius: 16px; border: 1.5px solid #e2e8f0;
            font-family: inherit; font-size: 0.9rem; outline: none; background: #f8fafc; cursor: pointer;
        }

        .btn-block {
            width: 100%; padding: 18px; background: #ef4444; color: white; border: none;
            border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 0.9rem;
            text-transform: uppercase; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .btn-unblock {
            width: 100%; padding: 18px; background: #16a34a; color: white; border: none;
            border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 0.9rem;
            text-transform: uppercase; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .status-info {
            margin-top: 20px; padding: 15px; border-radius: 15px; font-size: 0.8rem; text-align: center; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>pilih user yang ingin api key nya di blok</h2>
    <p>blokir akses user ke api profile.js secara manual</p>

    <div class="form-group">
        <label>pilih user</label>
        <select id="user-select">
            <option value="">memuat daftar user...</option>
        </select>
    </div>

    <button class="btn-block" onclick="updateStatus('blocked')">
        <i class="fa-solid fa-ban"></i> block api key
    </button>
    
    <button class="btn-unblock" onclick="updateStatus('active')">
        <i class="fa-solid fa-circle-check"></i> aktifkan kembali
    </button>

    <div id="msg" class="status-info" style="display: none;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Load Daftar User dari Realtime Database
    function loadUsers() {
        db.ref('users').on('value', (snap) => {
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">-- pilih user --</option>';
            
            if (snap.exists()) {
                snap.forEach(child => {
                    const user = child.val();
                    const status = user.api_status === 'blocked' ? '❌' : '✅';
                    select.innerHTML += `<option value="${child.key}">${status} ${user.fullname || child.key}</option>`;
                });
            }
        });
    }

    async function updateStatus(newStatus) {
        const userId = document.getElementById('user-select').value;
        if (!userId) return alert("pilih user dulu!");

        try {
            await db.ref('users/' + userId).update({
                api_status: newStatus
            });
            
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            msg.style.background = newStatus === 'blocked' ? '#fee2e2' : '#dcfce7';
            msg.style.color = newStatus === 'blocked' ? '#ef4444' : '#16a34a';
            msg.innerText = `berhasil! status user sekarang: ${newStatus}`;
            
        } catch (e) {
            alert("error: " + e.message);
        }
    }

    window.onload = loadUsers;
</script>

</body>
</html>
