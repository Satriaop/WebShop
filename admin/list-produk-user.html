<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin | list produk user 😼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; padding: 20px; text-transform: lowercase;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #1a1a1a; text-decoration: none; background: white; }
        
        .search-box {
            background: white; padding: 12px 20px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .search-box input { border: none; outline: none; width: 100%; font-family: inherit; font-weight: 600; text-transform: lowercase; }

        .produk-card {
            background: white; padding: 15px; border-radius: 25px;
            margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            border: 1px solid #fff; display: flex; flex-direction: column; gap: 12px;
        }

        .user-owner-info {
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 10px; border-bottom: 1px dashed #e2e8f0;
        }
        .user-owner-info i { color: #007bff; font-size: 0.8rem; }
        .owner-name { font-size: 0.7rem; font-weight: 800; color: #64748b; }

        .main-content { display: flex; gap: 15px; align-items: center; }
        .produk-img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #f8fafc; }
        
        .details { flex: 1; }
        .details h4 { margin: 0; font-size: 0.85rem; font-weight: 800; color: #1e293b; }
        .details .price { margin: 2px 0; font-size: 0.8rem; font-weight: 700; color: #007bff; }
        
        .stats-row { display: flex; gap: 10px; margin-top: 5px; }
        .stat-tag { font-size: 0.6rem; font-weight: 800; padding: 4px 8px; border-radius: 8px; background: #f1f5f9; color: #475569; }
        .tag-owner { background: #fff1f2; color: #be123c; }

        #loader { text-align: center; padding: 50px; color: #007bff; }
        .empty { text-align: center; color: #94a3b8; font-weight: 700; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="font-size: 1rem; margin: 0; font-weight: 900;">list produk user 😼</h2>
    </div>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8;"></i>
        <input type="text" id="cari" placeholder="cari nama produk atau nama owner..." oninput="filterData()">
    </div>

    <div id="loader"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i></div>
    <div id="list-produk-user"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseconfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseconfig);
    const db = firebase.database();

    function loadUserProducts() {
        db.ref('products').on('value', (snap) => {
            const container = document.getElementById('list-produk-user');
            const loader = document.getElementById('loader');
            container.innerHTML = "";
            loader.style.display = 'none';

            if (!snap.exists()) {
                container.innerHTML = '<div class="empty">tidak ada produk user 😼</div>';
                return;
            }

            snap.forEach((child) => {
                const data = child.val();
                
                // Filter: Hanya tampilkan jika produk diupload oleh user/owner (bukan admin/tertinggi)
                // Jika ingin menampilkan semua termasuk admin, hapus pengecekan uploadBy ini
                const isUserProduct = data.uploadBy && data.uploadBy !== "TERTINGGI DI WEBSITE INI 😼";

                if (isUserProduct) {
                    container.innerHTML += `
                        <div class="produk-card" data-search="${data.nama} ${data.uploadBy}">
                            <div class="user-owner-info">
                                <i class="fa-solid fa-store"></i>
                                <span class="owner-name">owner: ${data.uploadBy}</span>
                            </div>
                            <div class="main-content">
                                <img src="${data.foto}" class="produk-img">
                                <div class="details">
                                    <h4>${data.nama}</h4>
                                    <p class="price">rp ${Number(data.harga).toLocaleString('id-ID')}</p>
                                    <div class="stats-row">
                                        <span class="stat-tag">stok: ${data.stok}</span>
                                        <span class="stat-tag">kat: ${data.kategori}</span>
                                        <span class="stat-tag tag-owner">id: ${data.productId}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            if (container.innerHTML === "") {
                container.innerHTML = '<div class="empty">khusus produk owner kosong 😼</div>';
            }
        });
    }

    function filterData() {
        const val = document.getElementById('cari').value.toLowerCase();
        const cards = document.querySelectorAll('.produk-card');
        cards.forEach(card => {
            const searchBase = card.getAttribute('data-search').toLowerCase();
            card.style.display = searchBase.includes(val) ? 'flex' : 'none';
        });
    }

    window.onload = loadUserProducts;
</script>
</body>
</html>
