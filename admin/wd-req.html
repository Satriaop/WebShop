<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>admin - daftar penarikan</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; text-transform: lowercase; overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            height: 70px; display: flex; align-items: center; padding: 0 20px;
            position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .btn-back {
            width: 42px; height: 42px; background: #fff; border: 1px solid #e2e8f0;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-right: 15px; color: #1e293b;
        }

        .content { padding: 15px; max-width: 600px; margin: 0 auto; }

        .title-section { margin-bottom: 20px; padding: 0 5px; }
        .title-section h2 { margin: 0; font-size: 1.2rem; font-weight: 900; }
        .title-section p { margin: 5px 0 0; font-size: 0.8rem; color: #64748b; font-weight: 700; }

        .list-container { display: flex; flex-direction: column; gap: 12px; animation: fadein 0.5s ease; }

        .wd-card {
            background: white; padding: 18px; border-radius: 24px;
            border: 1px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; gap: 12px;
        }

        .wd-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .user-info h4 { margin: 0; font-size: 0.9rem; font-weight: 800; color: #1e293b; }
        .user-info span { font-size: 0.7rem; color: #94a3b8; font-weight: 600; }

        .status-badge {
            padding: 5px 12px; border-radius: 10px; font-size: 0.65rem; 
            font-weight: 900; text-transform: uppercase;
        }
        .pending { background: #fff7ed; color: #f97316; }
        .success { background: #f0fdf4; color: #22c55e; }

        .wd-body { 
            background: #f8fafc; padding: 12px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nominal { font-weight: 900; font-size: 1.1rem; color: #1a1a1a; }
        .rekening { font-weight: 700; font-size: 0.8rem; color: #007bff; text-align: right; }

        .wd-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-action {
            padding: 12px; border-radius: 14px; border: none; font-weight: 800;
            font-size: 0.75rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-done { background: #1a1a1a; color: white; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-action:active { transform: scale(0.95); }

        #loading-state { text-align: center; padding: 50px; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <div class="btn-back" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <span style="font-weight: 900; font-size: 1.1rem;">request penarikan</span>
    </div>

    <div class="content">
        <div class="title-section">
            <h2>daftar antrean</h2>
            <p id="count-info">memuat data permintaan...</p>
        </div>

        <div id="loading-state">menghubungkan ke server...</div>
        <div class="list-container" id="wd-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
            databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "market-d978f",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadWithdrawRequests() {
            db.ref('withdraw_requests').on('value', (snap) => {
                const list = document.getElementById('wd-list');
                const loader = document.getElementById('loading-state');
                const countInfo = document.getElementById('count-info');
                
                list.innerHTML = "";
                loader.style.display = 'none';

                if(snap.exists()){
                    let count = 0;
                    snap.forEach(child => {
                        count++;
                        let data = child.val();
                        let dateObj = new Date(data.date);
                        let dateStr = dateObj.toLocaleDateString('id-ID') + " " + dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});

                        list.innerHTML += `
                            <div class="wd-card">
                                <div class="wd-header">
                                    <div class="user-info">
                                        <h4>${data.userName}</h4>
                                        <span>${dateStr}</span>
                                    </div>
                                    <div class="status-badge ${data.status}">${data.status}</div>
                                </div>
                                <div class="wd-body">
                                    <div class="nominal">rp ${Number(data.nominal).toLocaleString('id-ID')}</div>
                                    <div class="rekening">${data.tujuan}</div>
                                </div>
                                <div class="wd-footer">
                                    <button class="btn-action btn-del" onclick="hapusRequest('${child.key}')">
                                        <i class="fa-solid fa-trash"></i> hapus
                                    </button>
                                    ${data.status === 'pending' ? `
                                        <button class="btn-action btn-done" onclick="selesaikanRequest('${child.key}')">
                                            <i class="fa-solid fa-check-circle"></i> selesaikan
                                        </button>
                                    ` : `
                                        <button class="btn-action" style="background:#e2e8f0; color:#64748b; cursor:default;">
                                            sudah diproses
                                        </button>
                                    `}
                                </div>
                            </div>
                        `;
                    });
                    countInfo.innerText = count + " permintaan ditemukan";
                } else {
                    countInfo.innerText = "0 permintaan";
                    list.innerHTML = '<div style="text-align:center; padding:50px; color:#94a3b8; font-weight:700;">tidak ada antrean penarikan.</div>';
                }
            });
        }

        function selesaikanRequest(key) {
            if(confirm("tandai penarikan ini sebagai sukses? (pastikan sudah transfer)")) {
                db.ref(`withdraw_requests/${key}`).update({
                    status: "success"
                }).then(() => {
                    alert("status berhasil diperbarui!");
                });
            }
        }

        function hapusRequest(key) {
            if(confirm("hapus data request ini dari database?")) {
                db.ref(`withdraw_requests/${key}`).remove()
                .then(() => {
                    alert("data berhasil dihapus!");
                });
            }
        }

        window.onload = loadWithdrawRequests;
    </script>
</body>
</html>
