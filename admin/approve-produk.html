<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>approve penjualan</title>
    <script src="../setting.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background: #f0f4f8; color: #1a1a1a; font-family: 'inter', sans-serif; 
            margin: 0; padding: 20px; text-transform: lowercase;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .btn-back { width: 35px; height: 35px; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #1a1a1a; text-decoration: none; background: white; }
        
        .approve-card { 
            background: white; border-radius: 25px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-notif { font-size: 0.75rem; font-weight: 800; color: #64748b; margin-bottom: 15px; display: block; line-height: 1.4; }
        .admin-notif b { color: #007bff; }

        .prod-img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid #f1f5f9; }
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #f8fafc; padding-bottom: 5px; }
        .info-row span:first-child { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .info-row span:last-child { font-size: 0.8rem; font-weight: 700; color: #1e293b; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-no { flex: 1; padding: 15px; background: #fee2e2; color: #ef4444; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-yes { flex: 2; padding: 15px; background: #1a1a1a; color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        #empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="font-size: 0.9rem; margin: 0;">approval penjualan</h2>
    </div>

    <div id="list-pending">
        <div id="empty-state">memuat data...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadPending() {
        const container = document.getElementById('list-pending');
        db.ref('pending_products').on('value', snap => {
            container.innerHTML = "";
            if (!snap.exists()) {
                container.innerHTML = '<div id="empty-state">tidak ada pengajuan produk baru koo.</div>';
                return;
            }

            snap.forEach(child => {
                const p = child.val();
                container.innerHTML += `
                    <div class="approve-card">
                        <span class="admin-notif">hai admin ada yang ingin mengajukan penjualan produk nih dari <b>${p.uploadBy}</b></span>
                        
                        <img src="${p.foto}" class="prod-img">
                        
                        <div class="info-row"><span>produk :</span> <span>${p.nama}</span></div>
                        <div class="info-row"><span>kategori :</span> <span>${p.kategori || 'umum'}</span></div>
                        <div class="info-row"><span>id :</span> <span>${p.productId}</span></div>
                        <div class="info-row"><span>harga :</span> <span>rp ${p.harga.toLocaleString()}</span></div>

                        <p style="font-size: 0.7rem; font-weight: 800; text-align: center; margin-top: 15px; color: #64748b;">apakah anda akan meng-aprove?</p>
                        
                        <div class="btn-group">
                            <button class="btn-no" onclick="handleAction('${child.key}', 'tolak')">tidak</button>
                            <button class="btn-yes" onclick="handleAction('${child.key}', 'approve')">aprove</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    async function handleAction(key, type) {
        if (type === 'approve') {
            const snap = await db.ref('pending_products/' + key).once('value');
            const data = snap.val();
            
            // Pindah ke folder produk utama agar tampil di toko
            await db.ref('products').push(data);
            await db.ref('pending_products/' + key).remove();
            alert("produk berhasil di approve dan tayang!");
        } else {
            if (confirm("yakin ingin menolak produk ini?")) {
                await db.ref('pending_products/' + key).remove();
                alert("produk ditolak!");
            }
        }
    }

    window.onload = loadPending;
</script>
</body>
</html>
