<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin | rekap owner 😼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=plus+jakarta+sans:wght@400;600;700;800&display=swap');

        body { 
            background: #f8fafc; color: #1e293b; font-family: 'plus jakarta sans', sans-serif; 
            margin: 0; padding: 25px 20px; text-transform: lowercase;
        }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { 
            display: flex; align-items: center; gap: 20px; margin-bottom: 35px; 
            background: white; padding: 15px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .btn-back { 
            width: 45px; height: 45px; border-radius: 16px; border: none; 
            display: flex; align-items: center; justify-content: center; 
            color: #1e293b; text-decoration: none; background: #f1f5f9;
            transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.9); }

        .list-rekap { display: flex; flex-direction: column; gap: 15px; }

        .card-rekap {
            background: white; padding: 20px; border-radius: 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative; overflow: hidden;
        }
        
        .card-rekap::before {
            content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%;
            background: #2563eb;
        }

        .info-owner { display: flex; flex-direction: column; gap: 4px; }

        .owner-name { 
            font-weight: 800; color: #0f172a; font-size: 0.95rem; 
            display: flex; align-items: center; gap: 8px; 
        }

        .shop-id { font-size: 0.65rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .total-amount { 
            text-align: right; font-weight: 900; color: #059669; 
            font-size: 1.1rem; letter-spacing: -0.5px;
        }

        #loader { text-align: center; padding: 100px 0; color: #2563eb; }
        
        .empty-state {
            text-align: center; padding: 60px 20px; color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
        <div>
            <h2 style="font-size: 1.1rem; margin: 0; font-weight: 900; letter-spacing: -0.5px;">rekap penjualan</h2>
            <p style="margin:0; font-size: 0.7rem; color: #94a3b8; font-weight: 700;">monitoring saldo owner 😼</p>
        </div>
    </div>

    <div id="loader"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i><br><p style="font-size: 0.8rem; font-weight: 700; margin-top: 15px;">menghitung rekap...</p></div>
    <div class="list-rekap" id="rekap-container"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseconfig = {
        apiKey: "AIzaSyDGRsCcT-7Bv_nOAybjXyuIT6Ca0IT4YTg",
        databaseURL: "https://market-d978f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "market-d978f",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseconfig);
    const db = firebase.database();

    async function hitungRekapOwner() {
        try {
            const snapshot = await db.ref('total_penjualan').once('value');
            const container = document.getElementById('rekap-container');
            document.getElementById('loader').style.display = 'none';

            if (!snapshot.exists()) {
                container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open fa-3x" style="margin-bottom:15px; opacity:0.3;"></i><br><b>belum ada data penjualan.</b></div>';
                return;
            }

            let rekap = {}; 

            snapshot.forEach(child => {
                const data = child.val();
                const rawToken = data.ownerToken || "unknown";
                const nominal = parseInt(data.masukKeOwner || 0);

                if (!rekap[rawToken]) {
                    rekap[rawToken] = 0;
                }
                rekap[rawToken] += nominal;
            });

            container.innerHTML = "";
            
            for (const [rawToken, total] of Object.entries(rekap)) {
                const cleanToken = rawToken.replace(/\./g, ',');
                
                const userSnap = await db.ref('users/' + cleanToken).get();
                const userData = userSnap.val() || {};
                const shopName = userData.shopName || userData.fullname || "toko tanpa nama";

                container.innerHTML += `
                    <div class="card-rekap">
                        <div class="info-owner">
                            <span class="owner-name">
                                <i class="fa-solid fa-store" style="color:#2563eb; font-size:0.8rem;"></i>
                                ${shopName}
                            </span>
                            <span class="shop-id">id: ${cleanToken.substring(0, 10)}...</span>
                        </div>
                        <div class="total-amount">
                            <span style="font-size: 0.7rem; color:#94a3b8; display:block; font-weight:700;">total omset</span>
                            rp ${total.toLocaleString('id-ID')}
                        </div>
                    </div>
                `;
            }

        } catch (error) {
            document.getElementById('loader').innerHTML = "<p style='color:red; font-weight:800;'>gagal memuat data!</p>";
        }
    }

    window.onload = hitungRekapOwner;
</script>
</body>
</html>
